<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Yejin Playlist</title>

    <!-- Content-Security-Policy: whitelist the only external origins this static app
         uses (YouTube embed/API, ytimg thumbnails, LRCLIB lyrics, jsDelivr font).
         localhost/ws entries are inert in production and keep `npm run dev` HMR working. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.youtube.com https://s.ytimg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' data: https://cdn.jsdelivr.net https://fastly.jsdelivr.net; img-src 'self' data: blob: https://i.ytimg.com https://*.ytimg.com https://img.youtube.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self' https://lrclib.net https://www.youtube.com https://*.ytimg.com ws://localhost:* http://localhost:*; base-uri 'self'; object-src 'none'"
    />

    <!-- Privacy: personal / non-public app (spec §12). Keep search engines out. -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph (messenger/social share previews — crawlers read these regardless of robots). -->
    <meta property="og:title" content="Yejin Playlist" />
    <meta
      property="og:description"
      content="누군가 당신에게 플레이리스트를 보냈어요 — 가사와 함께 흐르는 한 곡."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="og.png" />

    <!-- Twitter Card (mirrors OG). -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Yejin Playlist" />
    <meta
      name="twitter:description"
      content="누군가 당신에게 플레이리스트를 보냈어요 — 가사와 함께 흐르는 한 곡."
    />
    <meta name="twitter:image" content="og.png" />

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
